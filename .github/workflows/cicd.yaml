name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Run hello
        run: hello

  check-release:
    needs: [build-and-test]
    runs-on: ubuntu-24.04
    concurrency:
      group: release-please
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release-please.outputs.release_created }}
      tag: ${{ steps.release-please.outputs.tag_name }}
      release_type: ${{ steps.release-type.outputs.type }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Determine release type
        id: release-type
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          VERSION=$(jq -r '."."' .github/release-please-manifest.json)

          echo "Current manifest version: $VERSION"
          echo "Existing tags:"
          git tag --list

          RC_TAGS=$(git tag --list "v${VERSION}-rc.*" | head -1)
          STABLE_TAG=$(git tag --list "v${VERSION}" | head -1)

          echo "RC tags for v${VERSION}: $RC_TAGS"
          echo "Stable tag v${VERSION}: $STABLE_TAG"

          # Promotion scenario:
          # 1. Manifest version is stable (no -rc suffix)
          # 2. RC tags exist for this version
          # 3. Stable tag doesn't exist yet
          if [[ "$VERSION" != *-rc.* && -n "$RC_TAGS" && -z "$STABLE_TAG" ]]; then
            echo "config=.github/release-please-config.json" >> $GITHUB_OUTPUT
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "versioning_strategy=default" >> $GITHUB_OUTPUT
            echo "Promotion detected: RC tags exist for v${VERSION}, releasing stable"
          else
            echo "config=.github/release-please-config-rc.json" >> $GITHUB_OUTPUT
            echo "type=rc" >> $GITHUB_OUTPUT
            echo "versioning_strategy=prerelease" >> $GITHUB_OUTPUT
            echo "Normal development flow, using RC config with prerelease versioning"
          fi

      - name: Create Release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: googleapis/release-please-action@v4
        id: release-please
        with:
          manifest-file: .github/release-please-manifest.json
          config-file: ${{ steps.release-type.outputs.config || '.github/release-please-config-rc.json' }}
          target-branch: main
          versioning-strategy: ${{ steps.release-type.outputs.versioning_strategy || 'prerelease' }}

  run-deploy-workflow:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Deploy workflow for release
        run: |
          if [[ "${{ needs.check-release.outputs.release_type }}" == "stable" ]]; then
            IS_STABLE=true
          else
            IS_STABLE=false
          fi

          echo "Release type: ${{ needs.check-release.outputs.release_type }}"
          echo "Tag: ${{ needs.check-release.outputs.tag }}"
          echo "Is stable: $IS_STABLE"

          gh workflow run deploy.yml \
            --field version="${{ needs.check-release.outputs.tag }}" \
            --field deploy_to_pypi=${IS_STABLE}
        env:
          GH_TOKEN: ${{ github.token }}

  bootstrap-next-rc-cycle:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && needs.check-release.outputs.release_type == 'stable' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Calculate next RC version
        id: next-version
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0-rc.0"

          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Stable release: $VERSION → Next RC cycle: $NEXT_VERSION"

      - name: Check for existing bootstrap PR
        id: check-pr
        run: |
          BRANCH="bootstrap/${{ steps.next-version.outputs.next }}"
          EXISTING_PR=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "Bootstrap PR #${EXISTING_PR} already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting orphaned branch $BRANCH"
            git push origin --delete "$BRANCH" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bootstrap branch and PR
        if: ${{ steps.check-pr.outputs.exists == 'false' }}
        run: |
          NEXT="${{ steps.next-version.outputs.next }}"
          BRANCH="bootstrap/${NEXT}"

          git checkout -b "$BRANCH"

          jq --arg v "$NEXT" '."." = $v' .github/release-please-manifest.json > tmp.json
          mv tmp.json .github/release-please-manifest.json

          echo "$NEXT" > version.txt

          if jq -e 'has("release-as")' .github/release-please-config.json > /dev/null 2>&1; then
            jq 'del(."release-as")' .github/release-please-config.json > tmp.json
            mv tmp.json .github/release-please-config.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bootstrap $NEXT RC cycle after v${{ steps.next-version.outputs.current }} stable release"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bootstrap $NEXT RC cycle" \
            --body "## Summary

          Bootstraps the next RC cycle after stable release v${{ steps.next-version.outputs.current }}.

          ### What this PR does
          - Updates manifest to \`$NEXT\`
          - Updates version.txt to \`$NEXT\`
          - Removes \`release-as\` from stable config (cleanup)

          ### What happens when merged
          - New development commits will trigger RC release PRs
          - RC cycle continues: $NEXT → ${NEXT%.0}.1 → ... → stable

          ---
          **Previous Stable:** v${{ steps.next-version.outputs.current }}
          **Next RC Cycle:** $NEXT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
