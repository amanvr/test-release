name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Run hello
        run: hello

  check-release:
    needs: [build-and-test]
    runs-on: ubuntu-24.04
    concurrency:
      group: release-please
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release-please.outputs.release_created }}
      tag: ${{ steps.release-please.outputs.tag_name }}
      release_type: ${{ steps.release-type.outputs.type }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Determine release type
        id: release-type
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          MANIFEST_VERSION=$(jq -r '."."' .github/release-please-manifest.json)

          # Extract base version (remove -rc.* suffix if present)
          BASE_VERSION="${MANIFEST_VERSION%-rc.*}"

          echo "Manifest version: $MANIFEST_VERSION"
          echo "Base version: $BASE_VERSION"
          echo "Existing tags:"
          git tag --list

          STABLE_TAG=$(git tag --list "v${BASE_VERSION}" | head -1)

          echo "Stable tag v${BASE_VERSION}: $STABLE_TAG"

          # Stable promotion: only when stable tag already exists for this version
          # This means someone manually ran promote-to-stable workflow
          if [[ -n "$STABLE_TAG" ]]; then
            echo "Stable tag exists for v${BASE_VERSION}, skipping (already released)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            # Always create RC releases - promotion is manual via separate workflow
            echo "config=.github/release-please-config-rc.json" >> $GITHUB_OUTPUT
            echo "type=rc" >> $GITHUB_OUTPUT

            # Calculate correct RC version from existing tags
            HIGHEST_RC=$(git tag --list "v${BASE_VERSION}-rc.*" | sed 's/.*-rc\.//' | sort -n | tail -1)

            if [[ -n "$HIGHEST_RC" ]]; then
              NEXT_RC=$((HIGHEST_RC + 1))
              NEXT_VERSION="${BASE_VERSION}-rc.${NEXT_RC}"
              echo "Existing RC tags found. Highest: rc.${HIGHEST_RC} → Next: ${NEXT_VERSION}"
            else
              NEXT_VERSION="${BASE_VERSION}-rc.0"
              echo "No RC tags found. Starting RC cycle: ${NEXT_VERSION}"
            fi

            echo "release_as=${NEXT_VERSION}" >> $GITHUB_OUTPUT
            echo "RC release: ${NEXT_VERSION}"
          fi

      - name: Create Release
        if: ${{ github.ref == 'refs/heads/main' && steps.release-type.outputs.skip != 'true' }}
        uses: googleapis/release-please-action@v4
        id: release-please
        with:
          manifest-file: .github/release-please-manifest.json
          config-file: ${{ steps.release-type.outputs.config || '.github/release-please-config-rc.json' }}
          target-branch: main
          release-as: ${{ steps.release-type.outputs.release_as || '' }}

  run-deploy-workflow:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Deploy workflow for release
        run: |
          if [[ "${{ needs.check-release.outputs.release_type }}" == "stable" ]]; then
            IS_STABLE=true
          else
            IS_STABLE=false
          fi

          echo "Release type: ${{ needs.check-release.outputs.release_type }}"
          echo "Tag: ${{ needs.check-release.outputs.tag }}"
          echo "Is stable: $IS_STABLE"

          gh workflow run deploy.yml \
            --field version="${{ needs.check-release.outputs.tag }}" \
            --field deploy_to_pypi=${IS_STABLE}
        env:
          GH_TOKEN: ${{ github.token }}

  bootstrap-next-rc-cycle:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && needs.check-release.outputs.release_type == 'stable' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Calculate next version
        id: next-version
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_MINOR=$((MINOR + 1))
          # Set manifest to base version only - RC number calculated from tags
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0"

          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Stable release: $VERSION → Next version: $NEXT_VERSION (RC numbers auto-calculated)"

      - name: Check for existing bootstrap PR
        id: check-pr
        run: |
          BRANCH="bootstrap/${{ steps.next-version.outputs.next }}"
          EXISTING_PR=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "Bootstrap PR #${EXISTING_PR} already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting orphaned branch $BRANCH"
            git push origin --delete "$BRANCH" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bootstrap branch and PR
        if: ${{ steps.check-pr.outputs.exists == 'false' }}
        run: |
          NEXT="${{ steps.next-version.outputs.next }}"
          BRANCH="bootstrap/${NEXT}"

          git checkout -b "$BRANCH"

          jq --arg v "$NEXT" '."." = $v' .github/release-please-manifest.json > tmp.json
          mv tmp.json .github/release-please-manifest.json

          echo "$NEXT" > version.txt

          # Clean up release-as from both configs
          if jq -e 'has("release-as")' .github/release-please-config.json > /dev/null 2>&1; then
            jq 'del(."release-as")' .github/release-please-config.json > tmp.json
            mv tmp.json .github/release-please-config.json
          fi
          if jq -e 'has("release-as")' .github/release-please-config-rc.json > /dev/null 2>&1; then
            jq 'del(."release-as")' .github/release-please-config-rc.json > tmp.json
            mv tmp.json .github/release-please-config-rc.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bootstrap $NEXT RC cycle after v${{ steps.next-version.outputs.current }} stable release"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bootstrap v$NEXT development cycle" \
            --body "## Summary

          Bootstraps the next development cycle after stable release v${{ steps.next-version.outputs.current }}.

          ### What this PR does
          - Updates manifest to \`$NEXT\`
          - Updates version.txt to \`$NEXT\`

          ### What happens when merged
          - First RC release will be v${NEXT}-rc.0
          - Subsequent releases: v${NEXT}-rc.1 → rc.2 → ... → v${NEXT} (stable)

          ---
          **Previous Stable:** v${{ steps.next-version.outputs.current }}
          **Next Version:** $NEXT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
