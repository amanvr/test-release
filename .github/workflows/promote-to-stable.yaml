name: Promote RC to Stable

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g. "v0.1.0-rc.1")'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate RC version
        id: validate
        run: |
          RC_VERSION="${{ github.event.inputs.rc_version }}"

          if [[ ! "$RC_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Error: Invalid RC version format. Expected vX.Y.Z-rc.N"
            exit 1
          fi

          STABLE_VERSION="${RC_VERSION%-rc.*}"
          CLEAN_STABLE="${STABLE_VERSION#v}"

          echo "rc_version=$RC_VERSION" >> $GITHUB_OUTPUT
          echo "stable_version=$STABLE_VERSION" >> $GITHUB_OUTPUT
          echo "clean_stable=$CLEAN_STABLE" >> $GITHUB_OUTPUT

          echo "RC version: $RC_VERSION"
          echo "Stable version: $STABLE_VERSION"
          echo "Clean stable: $CLEAN_STABLE"

      - name: Update version files for stable release
        run: |
          CLEAN_VERSION="${{ steps.validate.outputs.clean_stable }}"

          echo "$CLEAN_VERSION" > version.txt
          echo "Updated version.txt to $CLEAN_VERSION"

          jq --arg v "$CLEAN_VERSION" '."." = $v' .github/release-please-manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json .github/release-please-manifest.json
          echo "Updated release-please-manifest.json to $CLEAN_VERSION"

          # Add release-as to stable config (action input is ignored in manifest mode)
          jq --arg v "$CLEAN_VERSION" '. + {"release-as": $v}' .github/release-please-config.json > /tmp/config.json
          mv /tmp/config.json .github/release-please-config.json
          echo "Added release-as: $CLEAN_VERSION to stable config"

          cat version.txt
          cat .github/release-please-manifest.json
          cat .github/release-please-config.json

      - name: Commit and push version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.txt .github/release-please-manifest.json .github/release-please-config.json
          git commit -m "chore: promote ${{ steps.validate.outputs.rc_version }} to ${{ steps.validate.outputs.stable_version }}"
          git push

          echo "Committed version changes. Release-please will create the stable release on next CI run."
